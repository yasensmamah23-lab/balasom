<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بلسم الشفاء للتمريض المنزلي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <!-- القائمة العلوية -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-xl font-bold text-emerald-600">بلسم الشفاء</div>
            <span class="text-sm bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-medium">رعاية منزلية متكاملة</span>
        </div>
    </header>

    <!-- القسم الرئيسي -->
    <main class="max-w-4xl mx-auto px-4 py-12 text-center">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-black text-gray-900 mb-4">منصة بلسم الشفاء للتمريض المنزلي</h1>
            <p class="text-gray-600 mb-8 max-w-lg mx-auto leading-relaxed">"رعاية طبية متكاملة بلمسة حنان مألوفة في دفء بيتك." الموقع قيد الإطلاق الفني النهائي حالياً لربط نظام الفرز التفاعلي الذكي بالواتساب الرسمي الخاص بكم في الزرقاء.</p>
            
            <div class="border-t border-gray-100 pt-6">
                <p class="text-sm text-gray-500 font-medium">مشرف المنصة: يـاسـيـن مـحـمـد</p>
            </div>
        </div>
    </main>
</body>
</html>
