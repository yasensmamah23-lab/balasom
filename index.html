<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بلسم الشفاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
        function toggleOtherService() {
            const select = document.getElementById('service');
            const otherDiv = document.getElementById('other-service-div');
            if (select.value === 'أخرى') {
                otherDiv.classList.remove('hidden');
            } else {
                otherDiv.classList.add('hidden');
            }
        }

        function getCurrentLocation() {
            const statusBtn = document.getElementById('location-btn');
            if (navigator.geolocation) {
                statusBtn.innerText = "⏳ جاري تحديد الموقع...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const geoUrl = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                        document.getElementById('location_url').value = geoUrl;
                        statusBtn.innerText = "✅ تم تحديد الموقع";
                    },
                    () => { statusBtn.innerText = "❌ تعذر تحديد الموقع"; }
                );
            }
        }

        function sendToWhatsApp(event) {
            event.preventDefault();
            const service = document.getElementById('service').value === 'أخرى' ? document.getElementById('other_service').value : document.getElementById('service').value;
            const message = `🚨 طلب رعاية: ${document.getElementById('patient_name').value}\n🩺 الخدمة: ${service}\n📊 الحالة: ${document.getElementById('condition').value}\n📝 ملاحظات: ${document.getElementById('symptoms').value}\n📍 العنوان: ${document.getElementById('address').value}\n🗺️ ${document.getElementById('location_url').value}`;
            window.open(`https://wa.me/962789188998?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans text-sm">

    <main class="max-w-md mx-auto p-4">
        <h1 class="text-lg font-bold text-center mb-4 text-emerald-700">بلسم الشفاء</h1>
        <form onsubmit="sendToWhatsApp(event)" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            
            <input type="text" id="patient_name" required placeholder="اسم المريض" class="w-full p-2.5 border rounded-lg">

            <select id="service" onchange="toggleOtherService()" class="w-full p-2.5 border rounded-lg text-slate-600">
                <option value="العناية بالجروح">العناية بالجروح وقرح الفراش</option>
                <option value="قسطرة بولية">تركيب قسطرة بولية</option>
                <option value="إبر ومحاليل">إعطاء إبر ومحاليل وريدية</option>
                <option value="سحب دم">سحب عينات دم</option>
                <option value="علامات حيوية">متابعة علامات حيوية</option>
                <option value="علاج طبيعي">جلسات علاج طبيعي</option>
                <option value="رعاية مرضى سكري">رعاية مرضى السكري</option>
                <option value="أخرى">أخرى (يرجى الكتابة)</option>
            </select>

            <div id="other-service-div" class="hidden">
                <input type="text" id="other_service" placeholder="اكتب الخدمة المطلوبة..." class="w-full p-2.5 border rounded-lg border-emerald-300">
            </div>

            <select id="condition" class="w-full p-2.5 border rounded-lg">
                <option value="مستقرة">حالة مستقرة</option>
                <option value="شبه مستقرة">حالة شبه مستقرة</option>
                <option value="غير مستقرة">حالة غير مستقرة</option>
            </select>

            <textarea id="symptoms" placeholder="ملاحظات طبية..." rows="2" class="w-full p-2.5 border rounded-lg"></textarea>

            <input type="text" id="address" required placeholder="المحافظة - المنطقة - الشارع" class="w-full p-2.5 border rounded-lg">
            
            <input type="hidden" id="location_url" value="لا يوجد موقع">
            <button type="button" id="location-btn" onclick="getCurrentLocation()" class="w-full p-2 border border-blue-200 bg-blue-50 text-blue-700 rounded-lg text-xs">📍 إرفاق موقع المنزل الحالي</button>

            <button type="submit" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold">إرسال التقرير</button>
        </form>
    </main>
</body>
</html>
