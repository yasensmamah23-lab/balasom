<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | بلسم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">الملف الشخصي</h1>
        
        <form class="space-y-6">
            <div class="flex items-center space-x-4 space-x-reverse">
                <div class="w-20 h-20 bg-slate-200 rounded-full flex items-center justify-center text-slate-500 font-bold">صورة</div>
                <button type="button" class="text-blue-600 font-bold">تغيير الصورة</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">الاسم الكامل</label>
                    <input type="text" value="ياسين" class="w-full p-3 border rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">رقم الهاتف</label>
                    <input type="text" placeholder="07xxxxxxxx" class="w-full p-3 border rounded-xl">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">العنوان الدقيق</label>
                <textarea rows="2" placeholder="المدينة، الحي، الشارع، علامة مميزة..." class="w-full p-3 border rounded-xl"></textarea>
            </div>

            <button type="button" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">حفظ التغييرات</button>
        </form>
    </div>
</body>
</html>
