<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة | بلسم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">تفاصيل طلب الخدمة</h1>
        
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">نوع الخدمة</label>
                <select class="w-full p-3 border rounded-xl bg-white">
                    <option>رعاية كبار السن</option>
                    <option>ضماد الجروح</option>
                    <option>إعطاء الحقن</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">تاريخ الموعد المطلوب</label>
                <input type="date" class="w-full p-3 border rounded-xl">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">ملاحظات للممرض</label>
                <textarea rows="3" placeholder="أدخل أي معلومات صحية إضافية..." class="w-full p-3 border rounded-xl"></textarea>
            </div>

            <button type="button" onclick="alert('تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">تأكيد الطلب</button>
            
            <div class="text-center">
                <a href="user-dashboard.html" class="text-slate-500 underline text-sm">العودة للوحة التحكم</a>
            </div>
        </form>
    </div>
</body>
</html>
