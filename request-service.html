<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة | بلسم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">طلب خدمة طبية</h1>
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">اختر الخدمة المطلوبة</label>
                <select class="w-full p-4 border rounded-xl bg-white">
                    <option>رعاية كبار السن</option>
                    <option>ضماد الجروح</option>
                    <option>إعطاء الحقن</option>
                    <option>فحوصات منزلية</option>
                    <option>أخرى</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">تفاصيل الحالة</label>
                <textarea rows="4" placeholder="اكتب ملاحظاتك عن الحالة الصحية للمريض..." class="w-full p-4 border rounded-xl"></textarea>
            </div>

            <button type="button" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">إرسال الطلب</button>
        </form>
    </div>

    <footer class="mt-12 py-6 text-center border-t border-slate-200">
        <p class="text-slate-500 text-sm font-bold">منصة بلسم للرعاية الصحية المنزلية © 2026</p>
    </footer>
</body>
</html>
