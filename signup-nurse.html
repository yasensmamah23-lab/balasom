<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل ممرض جديد | بلسم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">تسجيل الممرضين</h1>
        <form class="space-y-4">
            <input type="text" placeholder="الاسم الكامل" class="w-full p-4 border rounded-xl">
            <input type="text" placeholder="الرقم الوظيفي" class="w-full p-4 border rounded-xl">
            <input type="text" placeholder="رقم الهاتف" class="w-full p-4 border rounded-xl">
            <input type="password" placeholder="كلمة المرور" class="w-full p-4 border rounded-xl">
            <input type="password" placeholder="تأكيد كلمة المرور" class="w-full p-4 border rounded-xl">
            <button class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">إنشاء الحساب</button>
        </form>
    </div>

    <footer class="mt-12 py-6 text-center border-t border-slate-200">
        <p class="text-slate-500 text-sm font-bold">منصة بلسم للرعاية الصحية المنزلية © 2026</p>
        <p class="text-slate-400 text-xs mt-1">جميع الحقوق محفوظة - نصلكم أينما كنتم</p>
    </footer>
</body>
</html>
