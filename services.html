<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدماتنا في بلسم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-800 mb-8 text-center">خدماتنا الطبية المنزلية</h1>
        
        <div class="grid gap-4">
            <!-- قائمة الخدمات -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border-r-4 border-blue-600">
                <h2 class="font-bold text-xl mb-2">🩺 العناية بمرضى السكري</h2>
                <p class="text-slate-600">متابعة دقيقة، فحص دوري، وتثقيف صحي شامل.</p>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border-r-4 border-blue-600">
                <h2 class="font-bold text-xl mb-2">🩹 غيار الجروح والحروق</h2>
                <p class="text-slate-600">تعقيم احترافي وعناية متخصصة لضمان سرعة الالتئام.</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border-r-4 border-blue-600">
                <h2 class="font-bold text-xl mb-2">💉 إعطاء الإبر والمحاليل</h2>
                <p class="text-slate-600">بيد كادر تمريضي خبير وبأعلى معايير السلامة.</p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-slate-500 italic">نصلكم في عمان، الزرقاء، وجميع محافظات المملكة.</p>
        </div>
    </div>
</body>
</html>
