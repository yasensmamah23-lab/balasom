<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

        </form>
        <p class="mt-4 text-sm text-slate-600">
            ليس لديك حساب؟ <a href="signup-user.html" class="text-blue-600 font-bold underline">سجل الآن</a>
        </p>
    </div>

</html>
