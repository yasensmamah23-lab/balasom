<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستخدم جديد</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm">
        <h2 class="text-xl font-bold mb-6 text-center text-slate-800">إنشاء حساب مستخدم جديد</h2>
        <a href="index.html" class="block text-center text-slate-400 mb-4">← العودة للرئيسية</a>
        <div class="space-y-4">
            <div><label class="block mb-2 text-slate-600">الاسم الكامل</label><input type="text" class="w-full p-3 border rounded-xl" placeholder="الاسم الكامل"></div>
            <div><label class="block mb-2 text-slate-600">رقم الهاتف</label><input type="tel" class="w-full p-3 border rounded-xl" placeholder="رقم الهاتف"></div>
            <div><label class="block mb-2 text-slate-600">كلمة السر</label><input type="password" class="w-full p-3 border rounded-xl" placeholder="كلمة السر"></div>
            
            <button class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold mt-4">إنشاء الحساب</button>
        </div>
    </div>
</body>
</html>
